server:
  port: 8081

logging:
  level:
    com.sofly.supply.adapter.outbound.rapidapi: DEBUG

spring:
  application:
    name: travel-supply-service
  jackson:
    serialization:
      indent_output: true

  output:
    ansi:
      enabled: ALWAYS

amadeus:
  base-url: ${AMADEUS_BASE_URL:https://test.api.amadeus.com}
  client-id: ${AMADEUS_CLIENT_ID:}
  client-secret: ${AMADEUS_CLIENT_SECRET:}

springdoc:
  swagger-ui:
    path: /supply-docs
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs/supply

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: ${GOOGLE_PLACES_BASE_URL:https://places.googleapis.com}

app:
  suppliers:
    default: booking

rapidapi:
  api-key: ${RAPIDAPI_KEY:}
  host: ${RAPIDAPI_HOST:booking-com15.p.rapidapi.com}
  base-url: ${RAPIDAPI_BASE_URL:https://booking-com15.p.rapidapi.com}
