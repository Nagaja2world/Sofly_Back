name: Deploy travel-core-service

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/travel-core-service/**'
      - '.github/workflows/deploy-core.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build travel-core-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'gradle'

      - name: Grant Gradle permission
        run: chmod +x services/travel-core-service/gradlew

      - name: Build without tests
        run: |
          cd services/travel-core-service
          ./gradlew clean build -x test --no-daemon

      - name: Comment on PR if build fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚨 [core] 빌드 실패 (브랜치: \`${context.payload.pull_request.head.ref}\`) - 로그를 확인해주세요!`
            });

  deploy:
    name: Deploy core Blue/Green
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # DB
          SPRING_DATASOURCE_URL: ${{ secrets.CORE_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.CORE_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CORE_DATASOURCE_PASSWORD }}
          # Redis
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          # JWT
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          # OAuth2
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OAUTH2_REDIRECT_URI: ${{ secrets.OAUTH2_REDIRECT_URI }}
          # Supply 서비스 URL
          SUPPLY_SERVICE_URL: ${{ secrets.SUPPLY_SERVICE_URL }}
          # 배포 경로
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,REDIS_HOST,REDIS_PORT,JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,OAUTH2_REDIRECT_URI,SUPPLY_SERVICE_URL,DEPLOY_PATH
          script_stop: true
          script: |
            set -e

            # ── 헬스체크 함수 ──────────────────────────────────
            wait_for_health() {
              local port=$1
              echo "[Health Check] port: $port"
              for i in $(seq 1 60); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${port}/actuator/health || echo "000")
                if [ "$code" = "200" ]; then
                  echo "✅ core is UP on port $port"
                  return 0
                fi
                echo "  attempt $i/60 — HTTP $code"
                sleep 2
              done
              echo "❌ Health check failed"
              return 1
            }

            # ── 롤백 함수 ──────────────────────────────────────
            rollback() {
              echo "[ROLLBACK] 배포 실패 — 롤백 시작"
              git reset --hard "$PREV_COMMIT"
              cd services/travel-core-service
              chmod +x ./gradlew
              ./gradlew clean bootJar -x test --no-daemon
              cd "$DEPLOY_PATH"
              export APP_PORT=$TARGET_PORT
              export CONTAINER_NAME="core-$TARGET_COLOR"
              sudo -E docker compose -p "core-${TARGET_COLOR}" \
                -f docker-compose.core.yml up -d --build
            }

            trap 'rollback; exit 1' ERR

            # ── 1. 배포 경로 이동 ──────────────────────────────
            cd "$DEPLOY_PATH"

            # ── 2. 현재 포트 확인 → 타겟 결정 ────────────────
            CURRENT_PORT=$(grep -o '808[0-9]' /etc/nginx/conf.d/service-url-core.inc || echo "8080")

            if [ "$CURRENT_PORT" = "8080" ]; then
              TARGET_PORT=8081; TARGET_COLOR=green; CURRENT_COLOR=blue
            else
              TARGET_PORT=8080; TARGET_COLOR=blue;  CURRENT_COLOR=green
            fi

            echo "🔵 Current core: $CURRENT_COLOR ($CURRENT_PORT)"
            echo "🟢 Target  core: $TARGET_COLOR ($TARGET_PORT)"

            # ── 3. 최신 코드 pull ──────────────────────────────
            PREV_COMMIT=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main

            # ── 4. .env 생성 ───────────────────────────────────
            cat <<EOF > .env
            SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
            SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
            SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
            REDIS_HOST=$REDIS_HOST
            REDIS_PORT=$REDIS_PORT
            JWT_SECRET_KEY=$JWT_SECRET_KEY
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
            KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            OAUTH2_REDIRECT_URI=$OAUTH2_REDIRECT_URI
            SUPPLY_SERVICE_URL=$SUPPLY_SERVICE_URL
            APP_PORT=$TARGET_PORT
            CONTAINER_NAME=core-$TARGET_COLOR
            EOF
            chmod 600 .env

            # ── 5. JAR 빌드 ────────────────────────────────────
            cd services/travel-core-service
            chmod +x ./gradlew
            ./gradlew clean bootJar -x test --no-daemon
            cd "$DEPLOY_PATH"

            # ── 6. 새 컨테이너 실행 ────────────────────────────
            export APP_PORT=$TARGET_PORT
            export CONTAINER_NAME="core-$TARGET_COLOR"
            sudo -E docker compose -p "core-${TARGET_COLOR}" \
              -f docker-compose.core.yml up -d --build

            # ── 7. 헬스체크 ────────────────────────────────────
            if ! wait_for_health $TARGET_PORT; then
              sudo docker compose -p "core-${TARGET_COLOR}" logs --tail=50
              sudo -E docker compose -p "core-${TARGET_COLOR}" \
                -f docker-compose.core.yml down
              exit 1
            fi

            # ── 8. Nginx 트래픽 전환 ───────────────────────────
            echo "set \$core_url http://127.0.0.1:${TARGET_PORT};" | \
              sudo tee /etc/nginx/conf.d/service-url-core.inc
            sudo nginx -s reload

            # ── 9. 이전 컨테이너 종료 ─────────────────────────
            sudo docker compose -p "core-${CURRENT_COLOR}" \
              -f docker-compose.core.yml down || true

            # ── 10. 미사용 이미지 정리 ─────────────────────────
            sudo docker image prune -f

            echo "🚀 core Blue/Green 배포 완료! ($TARGET_COLOR:$TARGET_PORT)"
