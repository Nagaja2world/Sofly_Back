name: Deploy travel-supply-service

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'services/travel-supply-service/**'
      - '.github/workflows/deploy-supply.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build travel-supply-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'gradle'

      - name: Grant Gradle permission
        run: chmod +x services/travel-supply-service/gradlew

      - name: Build without tests
        run: |
          cd services/travel-supply-service
          ./gradlew clean build -x test --no-daemon

      - name: Comment on PR if build fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚨 [supply] 빌드 실패 (브랜치: \`${context.payload.pull_request.head.ref}\`) - 로그를 확인해주세요!`
            });

  deploy:
    name: Deploy supply Blue/Green
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: AMADEUS_CLIENT_ID,AMADEUS_CLIENT_SECRET,GOOGLE_PLACES_API_KEY,REDIS_HOST,REDIS_PORT,DEPLOY_PATH
          script_stop: true
          script: |
            set -e

            # ── 헬스체크 함수 ──────────────────────────────────
            wait_for_health() {
              local port=$1
              echo "[Health Check] port: $port"
              for i in $(seq 1 60); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${port}/actuator/health || echo "000")
                if [ "$code" = "200" ]; then
                  echo "✅ supply is UP on port $port"
                  return 0
                fi
                echo "  attempt $i/60 — HTTP $code"
                sleep 2
              done
              echo "❌ Health check failed"
              return 1
            }

            # ── 롤백 함수 ──────────────────────────────────────
            rollback() {
              echo "[ROLLBACK] 배포 실패 — 롤백 시작"
              git reset --hard "$PREV_COMMIT"
              cd services/travel-supply-service
              chmod +x ./gradlew
              ./gradlew clean bootJar -x test --no-daemon
              cd "$DEPLOY_PATH"
              export APP_PORT=$TARGET_PORT
              export CONTAINER_NAME="supply-$TARGET_COLOR"
              sudo -E docker compose -p "supply-${TARGET_COLOR}" \
                -f docker-compose.supply.yml up -d --build
            }

            trap 'rollback; exit 1' ERR

            cd "$DEPLOY_PATH"

            # ── 현재 포트 확인 → 타겟 결정 ────────────────────
            CURRENT_PORT=$(grep -o '808[0-9]' /etc/nginx/conf.d/service-url-supply.inc || echo "8082")

            if [ "$CURRENT_PORT" = "8082" ]; then
              TARGET_PORT=8083; TARGET_COLOR=green; CURRENT_COLOR=blue
            else
              TARGET_PORT=8082; TARGET_COLOR=blue;  CURRENT_COLOR=green
            fi

            echo "🔵 Current supply: $CURRENT_COLOR ($CURRENT_PORT)"
            echo "🟢 Target  supply: $TARGET_COLOR ($TARGET_PORT)"

            PREV_COMMIT=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main

            # ── .env 생성 ──────────────────────────────────────
            cat <<EOF > .env
            AMADEUS_CLIENT_ID=$AMADEUS_CLIENT_ID
            AMADEUS_CLIENT_SECRET=$AMADEUS_CLIENT_SECRET
            GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY
            REDIS_HOST=$REDIS_HOST
            REDIS_PORT=$REDIS_PORT
            APP_PORT=$TARGET_PORT
            CONTAINER_NAME=supply-$TARGET_COLOR
            EOF
            chmod 600 .env

            # ── JAR 빌드 ───────────────────────────────────────
            cd services/travel-supply-service
            chmod +x ./gradlew
            ./gradlew clean bootJar -x test --no-daemon
            cd "$DEPLOY_PATH"

            # ── 새 컨테이너 실행 ───────────────────────────────
            export APP_PORT=$TARGET_PORT
            export CONTAINER_NAME="supply-$TARGET_COLOR"
            sudo -E docker compose -p "supply-${TARGET_COLOR}" \
              -f docker-compose.supply.yml up -d --build

            # ── 헬스체크 ───────────────────────────────────────
            if ! wait_for_health $TARGET_PORT; then
              sudo docker compose -p "supply-${TARGET_COLOR}" logs --tail=50
              sudo -E docker compose -p "supply-${TARGET_COLOR}" \
                -f docker-compose.supply.yml down
              exit 1
            fi

            # ── Nginx 트래픽 전환 ──────────────────────────────
            echo "set \$supply_url http://127.0.0.1:${TARGET_PORT};" | \
              sudo tee /etc/nginx/conf.d/service-url-supply.inc
            sudo nginx -s reload

            # ── 이전 컨테이너 종료 ─────────────────────────────
            sudo docker compose -p "supply-${CURRENT_COLOR}" \
              -f docker-compose.supply.yml down || true

            sudo docker image prune -f

            echo "🚀 supply Blue/Green 배포 완료! ($TARGET_COLOR:$TARGET_PORT)"
