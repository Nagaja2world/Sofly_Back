name: Deploy travel-core-service

on:
  push:
    branches: [ "chore/21-cicd-multistage-build" ]
    paths:
      - 'services/travel-core-service/**'
      - '.github/workflows/deploy-core.yml'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: 🧪 Build travel-core-service
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set image tag
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/travel-core-service
          dockerfile: services/travel-core-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sofly-core:${{ github.sha }}

      - name: ❌ Leave comment on PR if build fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚨 [core] 빌드 실패 (브랜치: \`${context.payload.pull_request.head.ref}\`) - 로그를 확인해주세요!`
            });

      - name: ✅ Leave comment on PR if build succeeds
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ CI 성공 (브랜치: \`${context.payload.pull_request.head.ref}\`) - 빌드를 통과했습니다!`
            });

  deploy:
    name: Deploy core Blue/Green
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Debug outputs
        run: echo "image_tag=${{ needs.build-and-push.outputs.image_tag }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.CORE_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.CORE_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CORE_DATASOURCE_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OAUTH2_REDIRECT_URI: ${{ secrets.OAUTH2_REDIRECT_URI }}
          SUPPLY_SERVICE_URL: ${{ secrets.SUPPLY_SERVICE_URL }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/sofly-core:${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,REDIS_HOST,REDIS_PORT,JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,OAUTH2_REDIRECT_URI,SUPPLY_SERVICE_URL,DEPLOY_PATH,IMAGE_TAG,GEMINI_API_KEY
          script_stop: true
          script: |
            set -e
            echo "IMAGE_TAG=[$IMAGE_TAG]"
            env | grep IMAGE

            # ── 헬스체크 함수 ──────────────────────────────────
            wait_for_health() {
              local port=$1
              echo "[Health Check] Waiting for service on port $port..."
              for i in $(seq 1 60); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${port}/actuator/health || echo "000")
                if [ "$code" = "200" ]; then
                  echo "✅ core is UP on port $port"
                  return 0
                fi
                echo "  attempt $i/60 — HTTP $code"
                sleep 2
              done
              echo "❌ Health check failed"
              return 1
            }

            # ── 롤백 함수 ──────────────────────────────────────
            rollback() {
              echo "⏱️[ROLLBACK] 배포 실패 — 롤백 시작"
              trap - ERR

              # 변수가 설정되지 않은 초기 단계 실패면 롤백할 게 없음
              if [ -z "$TARGET_COLOR" ] || [ -z "$CURRENT_COLOR" ]; then
                echo "⏱️[ROLLBACK] 초기 단계 실패 — 롤백 생략"
                return 0
              fi

              # Nginx가 이미 전환됐을 수 있으므로 기존 포트로 되돌림
              echo "⏱️[ROLLBACK] Nginx를 $CURRENT_COLOR($CURRENT_PORT)로 복구"
              echo "⏱️set \$core_url http://127.0.0.1:${CURRENT_PORT};" | \
                sudo tee /etc/nginx/bluegreen/service-url-core.inc
              sudo nginx -s reload

              # 실패한 새 컨테이너 정리
              sudo docker stop core-${TARGET_COLOR} 2>/dev/null || true
              sudo docker rm  core-${TARGET_COLOR} 2>/dev/null || true

              # 기존 컨테이너(CURRENT)가 살아있으면 롤백 완료
              if sudo docker inspect core-${CURRENT_COLOR} > /dev/null 2>&1; then
                echo "⏱️[ROLLBACK] 완료 — core-${CURRENT_COLOR}($CURRENT_PORT) 이미 서비스 중"
                return 0
              fi

              # 기존 컨테이너가 없을 때만 이전 이미지로 재기동
              if [ -n "$PREV_IMAGE" ]; then
                echo "⏱️[ROLLBACK] core-${CURRENT_COLOR} 재기동 — $PREV_IMAGE"
                export CORE_IMAGE=$PREV_IMAGE
                export CORE_PORT=$CURRENT_PORT
                export CORE_CONTAINER_NAME=core-${CURRENT_COLOR}
                cd "$DEPLOY_PATH"
                sudo -E docker compose up -d core
                echo "⏱️[ROLLBACK] 완료"
              else
                echo "⏱️[ROLLBACK] 이전 이미지 없음 — 수동 복구 필요"
              fi
            }

            trap 'rollback; exit 1' ERR

            # ── 1. 배포 경로 이동 ──────────────────────────────
            echo "👉🏻[1] Move to deploy path"
            cd "$DEPLOY_PATH"

            # ── 2. 현재 포트 확인 → 타겟 결정 ────────────────
            echo "👉🏻[2] Check Current Port & Determine Target"
            CURRENT_PORT=$(grep -o '808[0-9]' /etc/nginx/bluegreen/service-url-core.inc 2>/dev/null || echo "8080")

            if [ "$CURRENT_PORT" == "8080" ]; then
              TARGET_PORT=8081
              TARGET_COLOR="green"
              CURRENT_COLOR="blue"
            elif [ "$CURRENT_PORT" == "8081" ]; then
              TARGET_PORT=8080
              TARGET_COLOR="blue"
              CURRENT_COLOR="green"
            else
              echo "⚠️ Defaulting to Green(8081)."
              TARGET_PORT=8081
              TARGET_COLOR="green"
              CURRENT_COLOR="blue"
            fi

            echo "🔵 Current core: $CURRENT_COLOR ($CURRENT_PORT)"
            echo "🟢 Target  core: $TARGET_COLOR ($TARGET_PORT)"

            # ── 3.1 이전 이미지 저장 (롤백용) ← 여기 추가 ──────
            echo "👉🏻[3] Previous Image save for rollback"
            PREV_IMAGE=$(docker inspect core-${CURRENT_COLOR} \
              --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo "📦 PREV_IMAGE: $PREV_IMAGE"

            echo "👉🏻[3.5] Git pull latest code"
            git reset --hard HEAD
            git clean -fd
            git fetch origin develop
            git checkout -B develop origin/develop
            git reset --hard origin/develop

            # 동기화 확인
            echo "📌 현재 브랜치: $(git branch --show-current)"
            echo "📌 현재 커밋:   $(git rev-parse HEAD)"
            echo "📌 커밋 메시지: $(git log -1 --pretty=format:'%s')"
            echo "📌 커밋 시간:   $(git log -1 --pretty=format:'%ci')"
            echo "📌 커밋 작성자: $(git log -1 --pretty=format:'%an')"

            # ── 4. .env 생성 ───────────────────────────────────
            echo "👉🏻[4] Create .env.core"
            cat <<EOF > .env.core
            SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
            SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
            SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
            REDIS_HOST=$REDIS_HOST
            REDIS_PORT=$REDIS_PORT
            JWT_SECRET_KEY=$JWT_SECRET_KEY
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
            KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            OAUTH2_REDIRECT_URI=$OAUTH2_REDIRECT_URI
            GEMINI_API_KEY=$GEMINI_API_KEY
            SUPPLY_SERVICE_URL=$SUPPLY_SERVICE_URL
            EOF
            chmod 600 .env.core

            # ── 5. Docker Hub 이미지 pull ──────────────────────
            echo "👉🏻[5] Docker Hub Image pull"
            sudo docker pull $IMAGE_TAG

            # ── 6. 새 컨테이너 실행 ────────────────────────────
            echo "👉🏻[6] Run New Container core-($TARGET_COLOR)"
            export CORE_IMAGE=$IMAGE_TAG
            export CORE_PORT=$TARGET_PORT
            export CORE_CONTAINER_NAME=core-${TARGET_COLOR}
            EXISTING_SUPPLY_IMAGE=$(docker inspect supply-blue --format='{{.Config.Image}}' 2>/dev/null || \
                                    docker inspect supply-green --format='{{.Config.Image}}' 2>/dev/null || \
                                    echo "dummy")
            export SUPPLY_IMAGE=$EXISTING_SUPPLY_IMAGE

            sudo -E docker compose -p "core-$TARGET_COLOR" up -d --no-deps core

            # ── 7. 헬스체크 ────────────────────────────────────
            echo "👉🏻[7] Health Check core-($TARGET_COLOR)"
            if ! wait_for_health $TARGET_PORT; then
              echo "❌ 헬스체크 실패 — 로그 확인"
              sudo docker logs core-${TARGET_COLOR} --tail=50
              # sudo docker stop core-${TARGET_COLOR} || true
              # sudo docker rm core-${TARGET_COLOR} || true
              echo "🛑 core-${TARGET_COLOR} 종료"
              sudo docker compose -p "core-$TARGET_COLOR" down
              rollback
              exit 1
            fi

            # ── 8. Nginx 트래픽 전환 ───────────────────────────
            echo "👉🏻[8] Switch Nginx Traffic"
            echo "set \$core_url http://127.0.0.1:${TARGET_PORT};" | \
              sudo tee /etc/nginx/bluegreen/service-url-core.inc

            # 설정 파일 내용 확인
            echo "📄 service-url-core.inc 내용:"
            cat /etc/nginx/bluegreen/service-url-core.inc

            # Nginx 문법 검사
            echo "🔍 Nginx 설정 문법 검사..."
            sudo nginx -t

            # reload
            sudo nginx -s reload

            echo "🔍 Nginx 전환 후 헬스체크 확인..."
            sleep 2
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.sofly.co.kr/actuator/health || echo "000")
            echo "📡 https://api.sofly.co.kr/actuator/health → HTTP $code"

            echo "✅ Nginx → core-${TARGET_COLOR}:${TARGET_PORT} 전환 완료"

            # ── 9. 이전 컨테이너 종료 ────────────────────────
            echo "👉🏻[9] stop old container ($CURRENT_COLOR)"
            # sudo docker stop core-${CURRENT_COLOR} || true
            # sudo docker rm core-${CURRENT_COLOR} || true
            sudo docker compose -p "core-$CURRENT_COLOR" down
            echo "🛑 core-${CURRENT_COLOR} 종료"

            # ── 10. 미사용 이미지 정리 ─────────────────────────
            echo "👉🏻[10] Cleanup Unused Images"
            sudo docker image prune -f

            echo "🚀 core Blue/Green 배포 완료! ($TARGET_COLOR:$TARGET_PORT)"
