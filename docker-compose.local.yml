services:
  postgres:
    image: postgres:16-alpine
    container_name: sofly-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sofly_db
      POSTGRES_USER: sofly_user
      POSTGRES_PASSWORD: sofly_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sofly_user -d sofly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sofly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
