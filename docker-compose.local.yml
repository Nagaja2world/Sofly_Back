services:
  core:
    build: ./services/travel-core-service
    container_name: sofly-core
    ports:
      - "8080:8080"
    env_file: ./services/travel-core-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sofly-postgres:5432/sofly_db
      SPRING_DATASOURCE_USERNAME: sofly_user
      SPRING_DATASOURCE_PASSWORD: sofly_password
      REDIS_HOST: sofly-redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - sofly-net

  supply:
    build: ./services/travel-supply-service
    container_name: sofly_supply
    ports:
      - "8082:8081"
    env_file: ./services/travel-supply-service/.env
    environment:
      REDIS_HOST: sofly-redis
    depends_on:
      redis:
        condition: service_started
    networks:
      - sofly-net

  postgres:
    image: postgres:16-alpine
    container_name: sofly-postgres
    networks:
      - sofly-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sofly_db
      POSTGRES_USER: sofly_user
      POSTGRES_PASSWORD: sofly_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sofly_user -d sofly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sofly-redis
    networks:
      - sofly-net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sofly-kafka
    ports:
      - "9092:9092"    # Docker 내부 서비스용 (kafka-ui 등)
      - "29092:29092"  # 호스트(gradle bootRun) 접속용
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - sofly-net

  # ── Monitoring ───────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sofly-redis-ui
    ports:
      - "8085:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - sofly-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sofly-kafka-ui
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sofly-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - sofly-net

  minio:
    image: minio/minio:latest
    container_name: sofly-minio
    ports:
      - "4566:9000"   # S3 API (S3_ENDPOINT=http://localhost:4566 로 접근)
      - "9001:9001"   # MinIO Console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: locallocal
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sofly-net

  minio-init:
    image: minio/mc:latest
    container_name: sofly-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 local locallocal;
        mc mb --ignore-existing local/sofly-bucket;
        mc anonymous set public local/sofly-bucket;
        echo 'sofly-bucket 생성 완료';
      "
    networks:
      - sofly-net

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: sofly-zipkin
    ports:
      - "9411:9411"
    networks:
      - sofly-net

  prometheus:
    image: prom/prometheus:latest
    container_name: sofly-prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 호스트(gradle bootRun) 접근용
    volumes:
      - ./monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - sofly-net

  grafana:
    image: grafana/grafana:latest
    container_name: sofly-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - sofly-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sofly-cadvisor
    ports:
      - "8086:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - sofly-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  sofly-net:
    name: sofly-net
